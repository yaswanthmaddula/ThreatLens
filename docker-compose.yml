version: "3.9"

services:
  backend:
    build: .
    container_name: urlshield-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - FLASK_DEBUG=false
    volumes:
      # Mount model file so you can update it without rebuilding
      - ./backend/url_model.pkl:/app/backend/url_model.pkl:ro
      - ./backend/model_metrics.json:/app/backend/model_metrics.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: nginx:alpine
    container_name: urlshield-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
